<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In to Facebook</title>
    <link rel="stylesheet" href="style.css">
   
</head>

<body>
    <div class="wrapper">

        <div class="top-text">
            <h1 class="FB-heading">facebook</h1>

            <p class="FB-intro">Facebook helps you connect and <div class="intro2">share with people in your life.</div></p>
        </div>

        <div class="login-area">
            <div class="login_form">
                <form action="">
                    <input class="input" type="email" placeholder="Email address or phone number ">

                    <input class="input" type="password" placeholder="Password">

                </form>

                <button class="login">Log In</button>
                <a class="forget" href="#">Forgot password?</a>

            </div>
            <button class="new-account">Create New Account</button>
        </div>




    </div>

</body>

</html>
